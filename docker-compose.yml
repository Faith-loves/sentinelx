services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - SENTINELX_ENV=production
      - SENTINELX_DEMO_MODE=false
      - SENTINELX_API_KEY=${SENTINELX_API_KEY:-}
      - SENTINELX_ADMIN_EMAIL=${SENTINELX_ADMIN_EMAIL:-admin@sentinelx.local}
      - SENTINELX_ADMIN_PASSWORD=${SENTINELX_ADMIN_PASSWORD:-ChangeMe-Admin-Password}
      - SENTINELX_ALLOW_REGISTRATION=${SENTINELX_ALLOW_REGISTRATION:-false}
      - SENTINELX_CORS_ORIGINS=http://localhost:3000
      - SENTINELX_ELASTICSEARCH_ENABLED=true
      - SENTINELX_ELASTICSEARCH_INDEX=sentinelx-logs
      - SENTINELX_ALERT_WEBHOOK_URL=${SENTINELX_ALERT_WEBHOOK_URL:-}
      - SENTINELX_OIDC_ENABLED=${SENTINELX_OIDC_ENABLED:-false}
      - SENTINELX_OIDC_ISSUER=${SENTINELX_OIDC_ISSUER:-}
      - SENTINELX_OIDC_CLIENT_ID=${SENTINELX_OIDC_CLIENT_ID:-}
      - SENTINELX_OIDC_AUTHORIZATION_URL=${SENTINELX_OIDC_AUTHORIZATION_URL:-}
      - SENTINELX_OIDC_TOKEN_URL=${SENTINELX_OIDC_TOKEN_URL:-}
      - SENTINELX_SLA_CRITICAL_MINUTES=${SENTINELX_SLA_CRITICAL_MINUTES:-15}
      - SENTINELX_SLA_HIGH_MINUTES=${SENTINELX_SLA_HIGH_MINUTES:-60}
      - SENTINELX_SLA_MEDIUM_MINUTES=${SENTINELX_SLA_MEDIUM_MINUTES:-240}
      - SENTINELX_SLA_LOW_MINUTES=${SENTINELX_SLA_LOW_MINUTES:-1440}
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - POSTGRES_URL=postgresql://sentinel:sentinel@postgres:5432/sentinelx
    depends_on:
      - elasticsearch
      - postgres
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/ready').read()"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - GROQ_API_KEY=${GROQ_API_KEY:-}
    depends_on:
      - backend

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel
      POSTGRES_DB: sentinelx
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  elasticsearch-data:
  postgres-data:
