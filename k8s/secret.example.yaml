apiVersion: v1
kind: Secret
metadata:
  name: sentinelx-secrets
  namespace: sentinelx
type: Opaque
stringData:
  SENTINELX_API_KEY: replace-with-service-key
  SENTINELX_ADMIN_EMAIL: admin@sentinelx.local
  SENTINELX_ADMIN_PASSWORD: replace-with-strong-password
  GROQ_API_KEY: replace-with-groq-key
  POSTGRES_URL: postgresql://sentinel:sentinel@postgres:5432/sentinelx
  SENTINELX_ALERT_WEBHOOK_URL: ""
